<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Sư Toán AI</title>
    <script type="text/javascript" async
      src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML">
    </script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f4f9; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #response { margin-top: 20px; white-space: pre-wrap; line-height: 1.6; }
        .error { color: red; background: #ffe6e6; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="text-align: center; color: #333;">🤖 Gia Sư Toán AI</h2>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="userInput" placeholder="Nhập bài toán (Ví dụ: Giải pt x^2 - 4x + 3 = 0)">
            <button onclick="askAI()" id="btnKey">Gửi Thầy</button>
        </div>
        <div id="response">Kết quả sẽ hiện ở đây...</div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <script type="module">
      import { GoogleGenerativeAI } from "@google/generative-ai";

      // --- CHỖ QUAN TRỌNG NHẤT: API KEY CỦA BẠN ---
      const API_KEY = "AIzaSyDLzIoH_R01baSdPCvV2mCJLSRCTbFdPB0";
      // ---------------------------------------------

      const genAI = new GoogleGenerativeAI(API_KEY);

      window.askAI = async function() {
        const out = document.getElementById("response");
        const btn = document.getElementById("btnKey");
        const prompt = document.getElementById("userInput").value;

        if(!prompt) return alert("Bạn chưa nhập câu hỏi!");

        btn.innerText = "Đang giải...";
        btn.disabled = true;
        out.innerHTML = "⏳ Thầy đang suy nghĩ...";
        out.className = "";

        try {
            // SỬ DỤNG MODEL: GEMINI-PRO (Bản ổn định nhất)
            const model = genAI.getGenerativeModel({ model: "gemini-pro" });

            // Ghép lời nhắc vai trò vào câu hỏi
            const fullQuery = "Bạn là gia sư toán. Hãy giải bài này từng bước thật dễ hiểu, dùng LaTeX cho công thức: " + prompt;

            const result = await model.generateContent(fullQuery);
            const response = await result.response;
            const text = response.text();

            out.innerHTML = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
            
            // Vẽ lại công thức Toán
            if(window.MathJax) MathJax.Hub.Queue(["Typeset", MathJax.Hub, "response"]);

        } catch (error) {
            out.className = "error";
            out.innerText = "🔴 LỖI: " + error.message;
        } finally {
            btn.innerText = "Gửi Thầy";
            btn.disabled = false;
        }
      }
    </script>
</body>
</html>
