<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Sư Toán AI</title>
    <script type="text/javascript" async
      src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML">
    </script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f0f2f5; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; }
        input { width: 70%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 12px 24px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #response { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 8px; min-height: 50px; }
        .error { color: red; background: #fff0f0; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🤖 Gia Sư Toán (Bản Ổn Định)</h2>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <input type="text" id="userInput" placeholder="Nhập bài toán (Ví dụ: Giải pt x^2 - 4x + 3 = 0)">
            <button onclick="askAI()" id="btnKey">Gửi Thầy</button>
        </div>
        <div id="response">Sẵn sàng...</div>
    </div>

    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <script type="module">
      import { GoogleGenerativeAI } from "@google/generative-ai";

      // Key của bạn
      const API_KEY = "AIzaSyDc-L7Em007MZHfkK3zkRWebyzlYtHdKZw"; 
      const genAI = new GoogleGenerativeAI(API_KEY);

      window.askAI = async function() {
        const out = document.getElementById("response");
        const btn = document.getElementById("btnKey");
        const prompt = document.getElementById("userInput").value;

        if(!prompt) return alert("Bạn chưa nhập câu hỏi!");
        
        btn.innerText = "Đang giải...";
        btn.disabled = true;
        out.innerHTML = "⏳ Thầy đang suy nghĩ...";
        out.className = "";

        try {
            // QUAN TRỌNG: Đổi sang model 'gemini-pro' (Bản này tương thích 100% mọi tài khoản)
            const model = genAI.getGenerativeModel({ model: "gemini-pro" });

            const result = await model.generateContent("Bạn là gia sư toán. Giải bài này chi tiết, dùng LaTeX trong dấu $$: " + prompt);
            const response = await result.response;
            const text = response.text();

            out.innerHTML = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>").replace(/\n/g, "<br>");
            if(window.MathJax) MathJax.Hub.Queue(["Typeset", MathJax.Hub, "response"]);

        } catch (error) {
            out.className = "error";
            out.innerHTML = "🔴 LỖI: " + error.message;
        } finally {
            btn.innerText = "Gửi Thầy";
            btn.disabled = false;
        }
      }
    </script>
</body>
</html>
